<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tools</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #d4d0c8;
  --dim: #555;
  --accent: #c8a96e;
  --green: #4a7c59;
  --red: #c0392b;
  --font: ui-monospace, 'Consolas', 'Menlo', 'Monaco', 'Segoe UI Mono', 'Liberation Mono', monospace;
}

html { color-scheme: dark; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 40px;
}

#app {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

h1 {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
}

.tool-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 28px;
}

.tool-entry {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: baseline;
  gap: 8px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: background 0.1s;
}

.tool-entry:hover {
  background: #131313;
}

.tool-entry:hover .tool-name {
  color: var(--accent);
}

.tool-cd {
  font-size: 11px;
  color: var(--dim);
  text-align: right;
  user-select: none;
  font-weight: 300;
}

.tool-name {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  transition: color 0.15s;
}

.tool-desc {
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
  padding-left: 12px;
}

#input-area {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 0 12px;
  transition: border-color 0.15s;
}

#input-area:focus-within {
  border-color: var(--accent);
}

#prompt {
  color: var(--accent);
  font-family: var(--font);
  font-size: 14px;
  user-select: none;
  padding-right: 8px;
  flex-shrink: 0;
}

#cmd {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 12px 0;
  caret-color: var(--accent);
}

#cmd::placeholder {
  color: var(--dim);
  font-weight: 300;
}

#feedback {
  margin-top: 14px;
  font-size: 12px;
  height: 16px;
  color: var(--dim);
}

#feedback.error { color: var(--red); }
#feedback.ok    { color: var(--green); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>tools</h1>
  </header>

  <div class="tool-list" id="tool-list"></div>

  <div id="input-area">
    <span id="prompt">&gt;</span>
    <input id="cmd" type="text" autocomplete="off" spellcheck="false" autofocus placeholder="cd tool" />
  </div>

  <div id="feedback"></div>
</div>

<script>
(function () {
  'use strict';

  const TOOLS = [
    { id: 'tasks', label: 'tasks', path: 'tasks/tasks.html', desc: 'to-do list' },
    { id: 'timer', label: 'timer', path: 'timer/timer.html', desc: 'pomodoro timer' },
  ];

  let feedbackTimer = null;

  function feedback(msg, type) {
    const el = document.getElementById('feedback');
    if (!el) return;
    el.textContent = msg;
    el.className = type || '';
    clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(() => {
      el.textContent = '';
      el.className = '';
    }, 2500);
  }

  function navigate(tool) {
    window.location.href = tool.path;
  }

  function renderTools() {
    const list = document.getElementById('tool-list');
    if (!list) return;
    list.innerHTML = TOOLS.map((t, i) => `
      <a class="tool-entry" href="${t.path}" data-id="${t.id}">
        <span class="tool-cd">${i + 1}</span>
        <span class="tool-name">${t.label}</span>
        <span class="tool-desc">${t.desc}</span>
      </a>
    `).join('');
  }

  function handleCommand(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return;

    const cdMatch = trimmed.match(/^cd\s+(\S+)$/i);
    if (cdMatch) {
      const arg = cdMatch[1].toLowerCase();
      const num = parseInt(arg, 10);
      if (!isNaN(num) && String(num) === arg) {
        const tool = TOOLS[num - 1];
        if (!tool) { feedback(`no tool #${num}`, 'error'); return; }
        navigate(tool);
        return;
      }
      const tool = TOOLS.find(t => t.id === arg || t.label === arg);
      if (!tool) { feedback(`unknown: ${arg}`, 'error'); return; }
      navigate(tool);
      return;
    }

    if (/^help$/i.test(trimmed)) {
      feedback('cd <name>  ·  cd <N>', '');
      return;
    }

    feedback('unknown command — try: cd tasks · cd timer', 'error');
  }

  function bind() {
    const cmdEl = document.getElementById('cmd');
    if (!cmdEl) return;

    let lastCmd = '';

    cmdEl.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && lastCmd && e.target.value.trim() === '') {
        e.preventDefault();
        e.target.value = lastCmd;
        queueMicrotask(() => e.target.setSelectionRange(lastCmd.length, lastCmd.length));
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        e.target.value = '';
        return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        const line = e.target.value;
        handleCommand(line);
        if (line.trim()) lastCmd = line;
        e.target.value = '';
      }
    });

    document.body.addEventListener('click', e => {
      if (e.target.closest('input, button, a')) return;
      cmdEl.focus();
    });
  }

  renderTools();
  bind();
})();
</script>
</body>
</html>
